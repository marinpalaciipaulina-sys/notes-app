<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osito Polar Notes</title>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           CORE VARIABLES & THEME
           ========================================= */
        :root {
            --font-main: 'Nunito', sans-serif;
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 16px;
            
            /* Light Theme */
            --bg-app: #F0F8FF; /* Alice Blue */
            --bg-card: #FFFFFF;
            --text-main: #0D47A1; /* Dark Blue */
            --text-sec: #546E7A;
            --primary: #29B6F6; /* Light Blue */
            --primary-dark: #0288D1;
            --danger: #FF5252;
            --success: #00C853;
            
            /* Priorities */
            --prio-high: #FF5252;
            --prio-med: #FFB300;
            --prio-low: #00C853;

            --shadow-subtle: 0 4px 20px rgba(41, 182, 246, 0.08);
            --shadow-float: 0 10px 40px rgba(41, 182, 246, 0.2);
            --glass-border: 1px solid rgba(255, 255, 255, 0.6);
        }

        [data-theme="dark"] {
            --bg-app: #050B14;
            --bg-card: #0F1724;
            --text-main: #E1F5FE;
            --text-sec: #90A4AE;
            --primary: #4FC3F7;
            --primary-dark: #81D4FA;
            --danger: #FF8A80;
            --success: #69F0AE;
            
            --prio-high: #FF5252;
            --prio-med: #FFD54F;
            --prio-low: #69F0AE;

            --shadow-subtle: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-float: 0 10px 40px rgba(0,0,0,0.5);
            --glass-border: 1px solid rgba(255,255,255,0.05);
        }

        /* =========================================
           RESET & BASE
           ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: var(--font-main) !important; }
        
        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        #root {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-app); /* Fallback */
        }

        /* =========================================
           UTILITIES & ANIMATIONS
           ========================================= */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .bear-bounce { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* Confetti Burst */
        .confetti { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 9999; animation: fall 1s forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        /* =========================================
           UI COMPONENTS
           ========================================= */
        
        /* Inputs */
        .input-base {
            width: 100%;
            padding: 16px;
            background: var(--bg-app);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
        }
        .input-base:focus { border-color: var(--primary); background: var(--bg-card); box-shadow: 0 0 0 4px rgba(41,182,246,0.1); }
        
        /* Buttons */
        .btn-primary {
            background: var(--text-main);
            color: var(--bg-app);
            width: 100%;
            padding: 18px;
            border-radius: var(--radius-lg);
            font-weight: 800;
            font-size: 1rem;
            border: none;
            box-shadow: var(--shadow-subtle);
            display: flex; justify-content: center; align-items: center; gap: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-primary:active { transform: scale(0.98); }

        .btn-icon {
            background: var(--bg-card);
            color: var(--text-main);
            border: var(--glass-border);
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-subtle);
        }

        /* Login Screen */
        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 24px;
            background: var(--bg-app);
        }
        
        .auth-card {
            background: var(--bg-card);
            padding: 32px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-float);
            border: var(--glass-border);
        }

        .auth-toggle {
            display: flex; background: var(--bg-app); padding: 5px; border-radius: 50px; margin-bottom: 24px; position: relative;
        }
        .auth-toggle button {
            flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-sec); font-weight: 700; z-index: 2; cursor: pointer;
        }
        .auth-toggle button.active { color: var(--bg-app); }
        .auth-toggle-bg {
            position: absolute; top: 5px; left: 5px; width: calc(50% - 5px); height: calc(100% - 10px); background: var(--text-main); border-radius: 50px; transition: transform 0.3s; z-index: 1;
        }
        .auth-toggle.register-mode .auth-toggle-bg { transform: translateX(100%); background: var(--primary); }

        /* Dashboard */
        .app-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-app);
            height: 100vh;
            overflow: hidden; /* Prevent body scroll, handle inside */
        }

        .top-bar {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            z-index: 10;
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .user-greeting h1 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); }
        .user-greeting p { font-size: 0.9rem; color: var(--text-sec); }

        .search-bar {
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-subtle);
        }
        .search-bar input { border: none; background: transparent; width: 100%; font-weight: 600; color: var(--text-main); outline: none; }

        .stats-scroll {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px;
        }
        .stat-card {
            min-width: 140px;
            background: var(--bg-card);
            padding: 16px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-subtle);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-desc { font-size: 0.8rem; color: var(--text-sec); font-weight: 600; }

        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 24px 12px 24px; }
        .filter-chip {
            background: var(--bg-card); color: var(--text-sec); padding: 8px 16px; border-radius: 50px;
            font-size: 0.85rem; font-weight: 700; white-space: nowrap; border: 1px solid var(--bg-app);
            cursor: pointer; transition: 0.2s;
        }
        .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .task-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 100px 24px; /* Bottom padding for FAB */
        }

        .task-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            box-shadow: var(--shadow-subtle);
            border: 1px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        .task-card:active { transform: scale(0.99); }
        .task-card.priority-high { border-left: 4px solid var(--prio-high); }
        .task-card.priority-med { border-left: 4px solid var(--prio-med); }
        .task-card.priority-low { border-left: 4px solid var(--prio-low); }
        .task-card.completed { opacity: 0.5; filter: grayscale(0.5); }

        .checkbox-custom {
            width: 28px; height: 28px; min-width: 28px;
            border: 3px solid var(--text-sec); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-top: 2px;
        }
        .checkbox-custom.checked { background: var(--success); border-color: var(--success); color: white; }

        .task-content h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
        .task-meta { display: flex; gap: 10px; align-items: center; font-size: 0.75rem; font-weight: 600; color: var(--text-sec); }
        
        .priority-badge { padding: 2px 8px; border-radius: 4px; color: white; font-size: 0.7rem; text-transform: uppercase; }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 64px; height: 64px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            box-shadow: var(--shadow-float);
            z-index: 100;
            border: none;
            cursor: pointer;
        }
        .fab:active { transform: scale(0.9); }

        /* SVG Bear */
        .bear-logo svg { width: 100px; height: 100px; margin-bottom: 20px; }
        
        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 1000; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-sheet {
            background: var(--bg-card); width: 100%; border-radius: 30px 30px 0 0;
            padding: 32px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .modal-overlay.open .modal-sheet { transform: translateY(0); }

        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 16px 0; }
        .cat-option {
            padding: 12px; border-radius: 12px; background: var(--bg-app); border: 2px solid transparent;
            text-align: center; font-weight: 700; font-size: 0.8rem; color: var(--text-sec); cursor: pointer;
        }
        .cat-option.selected { border-color: var(--primary); color: var(--primary); background: rgba(41,182,246,0.1); }

        .prio-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .prio-btn { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid var(--bg-app); background: var(--bg-app); font-weight: 700; cursor: pointer; }
        .prio-btn.selected { background: var(--text-main); color: var(--bg-app); border-color: var(--text-main); }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // =========================================
        // SVG POLAR BEAR
        // =========================================
        const PolarBearSVG = () => (
            <div className="bear-logo">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#FFFFFF" />
                    <circle cx="18" cy="25" r="12" fill="#FFFFFF" />
                    <circle cx="82" cy="25" r="12" fill="#FFFFFF" />
                    <circle cx="18" cy="25" r="6" fill="#E1F5FE" />
                    <circle cx="82" cy="25" r="6" fill="#E1F5FE" />
                    <circle cx="35" cy="45" r="5" fill="#0D47A1" />
                    <circle cx="65" cy="45" r="5" fill="#0D47A1" />
                    <circle cx="25" cy="60" r="8" fill="#FFCDD2" opacity="0.6"/>
                    <circle cx="75" cy="60" r="8" fill="#FFCDD2" opacity="0.6"/>
                    <ellipse cx="50" cy="65" rx="15" ry="10" fill="#E1F5FE" />
                    <circle cx="50" cy="62" r="4" fill="#333" />
                    <path d="M46 70 Q50 74 54 70" stroke="#333" strokeWidth="2" fill="none" strokeLinecap="round" />
                </svg>
            </div>
        );

        // =========================================
        // CONSTANTS
        // =========================================
        const PRIORITIES = [
            { id: 'high', label: 'Urgente', color: 'var(--prio-high)' },
            { id: 'med', label: 'Media', color: 'var(--prio-med)' },
            { id: 'low', label: 'Baja', color: 'var(--prio-low)' }
        ];

        const CATEGORIES = [
            { id: 'all', label: 'Todas' },
            { id: 'salud', label: 'Salud' },
            { id: 'trabajo', label: 'Trabajo' },
            { id: 'familia', label: 'Familia' },
            { id: 'novia', label: 'Novia \u2764\ufe0f' }
        ];

        // =========================================
        // AUTH SCREEN
        // =========================================
        const AuthScreen = ({ onLogin }) => {
            const [isRegister, setIsRegister] = useState(false);
            const [loading, setLoading] = useState(false);
            const [name, setName] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    onLogin({ name: isRegister ? name : 'Osito Polar' });
                }, 1200);
            };

            return (
                <div className="auth-container slide-up">
                    <div style={{textAlign: 'center', marginBottom: 20}}>
                        <PolarBearSVG />
                        <h1 style={{fontSize: '2rem', color: 'var(--text-main)'}}>Osito Polar</h1>
                        <p style={{color: 'var(--text-sec)'}}>Organiza tu vida con estilo \u00e1rtico</p>
                    </div>
                    
                    <form className="auth-card" onSubmit={handleSubmit}>
                        <div className={`auth-toggle ${isRegister ? 'register-mode' : ''}`}>
                            <div className="auth-toggle-bg"></div>
                            <button type="button" onClick={() => setIsRegister(false)} className={!isRegister ? 'active' : ''}>Ingresar</button>
                            <button type="button" onClick={() => setIsRegister(true)} className={isRegister ? 'active' : ''}>Crear Cuenta</button>
                        </div>

                        {isRegister && (
                            <div style={{marginBottom: '16px'}}>
                                <label style={{display:'block', fontSize:'0.8rem', fontWeight:'700', marginBottom:'6px', color:'var(--text-sec)'}}>Tu Nombre</label>
                                <input type="text" className="input-base" placeholder="Ej. Osito Polar" value={name} onChange={e => setName(e.target.value)} required />
                            </div>
                        )}

                        <div style={{marginBottom: '16px'}}>
                            <label style={{display:'block', fontSize:'0.8rem', fontWeight:'700', marginBottom:'6px', color:'var(--text-sec)'}}>Correo</label>
                            <input type="email" className="input-base" placeholder="correo@ejemplo.com" required />
                        </div>

                        <div style={{marginBottom: '24px'}}>
                            <label style={{display:'block', fontSize:'0.8rem', fontWeight:'700', marginBottom:'6px', color:'var(--text-sec)'}}>Contrase\u00f1a</label>
                            <input type="password" className="input-base" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" required />
                        </div>

                        <button type="submit" className="btn-primary" disabled={loading}>
                            {loading ? 'Cargando...' : (isRegister ? 'Registrarse' : 'Entrar')}
                        </button>
                    </form>
                </div>
            );
        };

        // =========================================
        // ADD TASK MODAL
        // =========================================
        const AddTaskModal = ({ isOpen, onClose, onAdd }) => {
            const [text, setText] = useState('');
            const [category, setCategory] = useState('novia');
            const [priority, setPriority] = useState('med');
            const [date, setDate] = useState('');

            if (!isOpen) return null;

            const handleSave = () => {
                if(!text.trim()) return;
                onAdd({ text, category, priority, date });
                setText(''); setCategory('novia'); setPriority('med'); setDate('');
                onClose();
            };

            return (
                <div className="modal-overlay open" onClick={onClose}>
                    <div className="modal-sheet" onClick={e => e.stopPropagation()}>
                        <h3 style={{marginBottom:'20px', fontSize:'1.4rem'}}>Nueva Misión</h3>
                        
                        <textarea 
                            className="input-base" 
                            rows="3" 
                            placeholder="\u00bfQu\u00e9 necesitas hacer hoy, osito?" 
                            value={text} onChange={e => setText(e.target.value)}
                            style={{marginBottom:'16px'}}
                        ></textarea>

                        <label style={{fontSize:'0.9rem', fontWeight:'700', color:'var(--text-sec)', display:'block', marginBottom:'8px'}}>Prioridad</label>
                        <div className="prio-selector">
                            {PRIORITIES.map(p => (
                                <div 
                                    key={p.id} 
                                    className={`prio-btn ${priority === p.id ? 'selected' : ''}`}
                                    onClick={() => setPriority(p.id)}
                                    style={{borderColor: priority === p.id ? p.color : 'transparent'}}
                                >
                                    {p.label}
                                </div>
                            ))}
                        </div>

                        <label style={{fontSize:'0.9rem', fontWeight:'700', color:'var(--text-sec)', display:'block', marginBottom:'8px'}}>Categor\u00eda</label>
                        <div className="category-grid">
                            {CATEGORIES.filter(c => c.id !== 'all').map(c => (
                                <div 
                                    key={c.id}
                                    className={`cat-option ${category === c.id ? 'selected' : ''}`}
                                    onClick={() => setCategory(c.id)}
                                >
                                    {c.label}
                                </div>
                            ))}
                        </div>

                        <label style={{fontSize:'0.9rem', fontWeight:'700', color:'var(--text-sec)', display:'block', marginBottom:'8px'}}>Fecha L\u00edmite</label>
                        <input type="date" className="input-base" value={date} onChange={e => setDate(e.target.value)} style={{marginBottom:'24px'}} />

                        <button onClick={handleSave} className="btn-primary">Guardar Misión</button>
                    </div>
                </div>
            );
        };

        // =========================================
        // MAIN DASHBOARD
        // =========================================
        const Dashboard = ({ user }) => {
            const [tasks, setTasks] = useState([]);
            const [search, setSearch] = useState('');
            const [filterCat, setFilterCat] = useState('all');
            const [modalOpen, setModalOpen] = useState(false);

            // Load Data
            useEffect(() => {
                const saved = localStorage.getItem('osito_tasks_v2');
                if (saved) setTasks(JSON.parse(saved));
            }, []);

            // Save Data
            useEffect(() => {
                localStorage.setItem('osito_tasks_v2', JSON.stringify(tasks));
            }, [tasks]);

            // Logic
            const stats = useMemo(() => {
                const total = tasks.length;
                const done = tasks.filter(t => t.completed).length;
                const pending = total - done;
                const urgent = tasks.filter(t => !t.completed && t.priority === 'high').length;
                return { total, done, pending, urgent };
            }, [tasks]);

            const filteredTasks = tasks.filter(t => {
                const matchesSearch = t.text.toLowerCase().includes(search.toLowerCase());
                const matchesCat = filterCat === 'all' || t.category === filterCat;
                return matchesSearch && matchesCat;
            }).sort((a, b) => {
                // Sort by Priority (High first) then by Completed
                if (a.completed === b.completed) {
                    const prioWeight = { high: 3, med: 2, low: 1 };
                    return prioWeight[b.priority] - prioWeight[a.priority];
                }
                return a.completed ? 1 : -1;
            });

            const triggerConfetti = () => {
                const colors = ['#29B6F6', '#FF5252', '#FFD54F', '#00C853'];
                for (let i = 0; i < 30; i++) {
                    const conf = document.createElement('div');
                    conf.className = 'confetti';
                    conf.style.left = Math.random() * 100 + 'vw';
                    conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    conf.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                    document.body.appendChild(conf);
                    setTimeout(() => conf.remove(), 2000);
                }
            };

            const addTask = (taskData) => {
                setTasks([{ id: Date.now(), completed: false, ...taskData }, ...tasks]);
            };

            const toggleComplete = (id) => {
                setTasks(tasks.map(t => {
                    if (t.id === id && !t.completed) triggerConfetti();
                    return t.id === id ? { ...t, completed: !t.completed } : t;
                }));
            };

            const deleteTask = (id) => {
                if(confirm("\u00bfBorrar esta tarea, osito?")) {
                    setTasks(tasks.filter(t => t.id !== id));
                }
            };

            return (
                <div className="app-layout fade-in">
                    {/* Top Section (Fixed) */}
                    <div className="top-bar">
                        <div className="header-row">
                            <div className="user-greeting">
                                <p>Bienvenido de nuevo,</p>
                                <h1>{user.name} \ud83d\udc3b\u200d\u2744\ufe0f</h1>
                            </div>
                            <button className="btn-icon">
                                <i className="ph ph-gear"></i>
                            </button>
                        </div>

                        {/* Search */}
                        <div className="search-bar">
                            <i className="ph ph-magnifying-glass" style={{fontSize: '1.2rem', color: 'var(--text-sec)'}}></i>
                            <input 
                                type="text" 
                                placeholder="Buscar misi\u00f3n..." 
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                        </div>

                        {/* Stats Scroll */}
                        <div className="stats-scroll">
                            <div className="stat-card">
                                <span className="stat-num">{stats.total}</span>
                                <span className="stat-desc">Total Tareas</span>
                            </div>
                            <div className="stat-card">
                                <span className="stat-num" style={{color: 'var(--prio-high)'}}>{stats.urgent}</span>
                                <span className="stat-desc">Urgentes</span>
                            </div>
                            <div className="stat-card">
                                <span className="stat-num" style={{color: 'var(--success)'}}>{stats.done}</span>
                                <span className="stat-desc">Completadas</span>
                            </div>
                        </div>

                        {/* Categories */}
                        <div className="filter-bar">
                            {CATEGORIES.map(c => (
                                <button 
                                    key={c.id}
                                    className={`filter-chip ${filterCat === c.id ? 'active' : ''}`}
                                    onClick={() => setFilterCat(c.id)}
                                >
                                    {c.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Task List (Scrollable) */}
                    <div className="task-list-container">
                        {filteredTasks.length === 0 ? (
                            <div style={{textAlign: 'center', marginTop: 60, color: 'var(--text-sec)'}}>
                                <i className="ph ph-check-circle" style={{fontSize: '3rem', opacity: 0.5, marginBottom: 10}}></i>
                                <p>No hay tareas en esta categor\u00eda.</p>
                                <p style={{fontSize: '0.8rem'}}>\u00a1Disfruta tu d\u00eda!</p>
                            </div>
                        ) : (
                            filteredTasks.map(task => {
                                const prioInfo = PRIORITIES.find(p => p.id === task.priority);
                                const catInfo = CATEGORIES.find(c => c.id === task.category);
                                
                                return (
                                    <div key={task.id} className={`task-card priority-${task.priority} ${task.completed ? 'completed' : ''}`}>
                                        <div 
                                            className={`checkbox-custom ${task.completed ? 'checked' : ''}`}
                                            onClick={() => toggleComplete(task.id)}
                                        >
                                            {task.completed && <i className="ph ph-check-fat-fill"></i>}
                                        </div>
                                        <div style={{flex: 1}}>
                                            <h3>{task.text}</h3>
                                            <div className="task-meta">
                                                <span className="priority-badge" style={{background: prioInfo.color}}>{prioInfo.label}</span>
                                                <span>\u2022</span>
                                                <span>{catInfo.label}</span>
                                                {task.date && <span>\u2022 {task.date}</span>}
                                            </div>
                                        </div>
                                        <button onClick={() => deleteTask(task.id)} style={{background:'transparent', color: 'var(--text-sec)', border:'none'}}>
                                            <i className="ph ph-trash" style={{fontSize: '1.2rem'}}></i>
                                        </button>
                                    </div>
                                );
                            })
                        )}
                    </div>

                    {/* FAB */}
                    <button className="fab" onClick={() => setModalOpen(true)}>
                        <i className="ph ph-plus"></i>
                    </button>

                    {/* Modal */}
                    <AddTaskModal isOpen={modalOpen} onClose={() => setModalOpen(false)} onAdd={addTask} />
                </div>
            );
        };

        // =========================================
        // APP ROOT
        // =========================================
        const App = () => {
            const [user, setUser] = useState(null);

            return user ? <Dashboard user={user} /> : <AuthScreen onLogin={setUser} />;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
