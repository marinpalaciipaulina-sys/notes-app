<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osito Polar Notes</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-main: 'Nunito', sans-serif;
            --radius-pill: 60px;
            --radius-card: 28px;
            --radius-btn: 20px;
            --bg-app: #E3F2FD;
            --bg-card: #FFFFFF;
            --text-main: #0D47A1;
            --text-sec: #546E7A;
            --primary-grad: linear-gradient(135deg, #4FC3F7 0%, #0288D1 100%);
            --icon-color: #0288D1;
            --icon-light: #4FC3F7;
            --btn-shadow: 0 8px 24px rgba(2, 136, 209, 0.3);
            --card-shadow: 0 8px 30px rgba(2, 136, 209, 0.08);
            --prio-high: #FF5252;
            --prio-med: #FFAB40;
            --prio-low: #69F0AE;
            --cat-salud: #00BFA5;
            --cat-trabajo: #5C6BC0;
            --cat-familia: #FFA726;
            --cat-uni: #7E57C2;
            --cat-novia: #EC407A;
            --love-grad: linear-gradient(135deg, #EC407A 0%, #F48FB1 50%, #4FC3F7 100%);
        }
        [data-theme="dark"] {
            --bg-app: #0B1422;
            --bg-card: #152238;
            --text-main: #E1F5FE;
            --text-sec: #78909C;
            --icon-color: #4FC3F7;
            --icon-light: #81D4FA;
            --primary-grad: linear-gradient(135deg, #0277BD 0%, #01579B 100%);
            --card-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            --btn-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: var(--font-main) !important; }
        body { background: var(--bg-app); color: var(--text-main); min-height: 100vh; overflow-x: hidden; transition: background 0.4s, color 0.4s; }
        #root { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; background: var(--bg-app); }
        @keyframes elasticIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .elastic-in { animation: elasticIn 0.55s cubic-bezier(0.68, -0.4, 0.265, 1.4) forwards; }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .slide-up { animation: slideUp 0.45s cubic-bezier(0.22, 0.8, 0.36, 1) forwards; }
        @keyframes bearFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .bear-float { animation: bearFloat 3s ease-in-out infinite; }
        @keyframes heartbeat { 0%{transform:scale(1)}15%{transform:scale(1.25)}30%{transform:scale(1)}45%{transform:scale(1.25)}75%{transform:scale(1)} }
        .heart-beat { animation: heartbeat 1.8s ease-in-out infinite; display: inline-block; }
        @keyframes fadeSlideOut { to { opacity: 0; transform: translateX(80px); max-height: 0; margin-bottom: 0; padding: 0; overflow: hidden; } }
        .task-removing { animation: fadeSlideOut 0.4s forwards; pointer-events: none; }
        @keyframes taskIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .task-enter { animation: taskIn 0.35s ease-out forwards; }
        @keyframes pulseGlow { 0%,100%{ box-shadow: 0 0 0 0 rgba(2,136,209,0.3); } 50%{ box-shadow: 0 0 0 12px rgba(2,136,209,0); } }
        .pulse-glow { animation: pulseGlow 2s infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes motivIn { 0% { transform: translateY(10px) scale(0.95); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes motivOut { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-10px) scale(0.95); opacity: 0; } }
        @keyframes streakPulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.08)} }
        @keyframes progressFill { from { height: 0; } }
        @keyframes pulseUrgent { 0%,100%{opacity:1}50%{opacity:0.6} }
        @keyframes shakeX { 0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)} }
        .shake-x { animation: shakeX 0.4s ease-out; }
        .toast-wrap { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 9000; pointer-events: none; }
        .toast-msg { background: var(--text-main); color: var(--bg-card); padding: 14px 28px; border-radius: var(--radius-pill); font-weight: 800; font-size: 0.92rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; white-space: nowrap; opacity: 0; transform: translateY(-20px); transition: all 0.35s; }
        .toast-msg.visible { opacity: 1; transform: translateY(0); }
        .btn-primary { background: var(--primary-grad); color: #fff; width: 100%; padding: 18px; border-radius: var(--radius-pill); font-weight: 800; font-size: 1.05rem; border: none; box-shadow: var(--btn-shadow); display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; transition: transform 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-primary:active { transform: scale(0.96); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary { background: var(--bg-card); color: var(--text-main); padding: 14px 24px; border-radius: var(--radius-pill); font-weight: 700; font-size: 1rem; border: none; box-shadow: var(--card-shadow); cursor: pointer; transition: 0.2s; }
        .btn-secondary:active { transform: scale(0.97); }
        .btn-icon { background: var(--bg-card); color: var(--icon-color); width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: var(--card-shadow); border: none; cursor: pointer; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
        .btn-icon:active { transform: scale(0.88); }
        .input-base { width: 100%; padding: 16px 20px; background: var(--bg-card); border: 2px solid transparent; border-radius: var(--radius-btn); color: var(--text-main); font-size: 1rem; font-weight: 700; outline: none; box-shadow: var(--card-shadow); transition: 0.2s; }
        .input-base:focus { border-color: var(--icon-color); }
        .confetti-piece { position: fixed; top: -20px; pointer-events: none; z-index: 99999; will-change: transform; }
        @keyframes confettiDrop { 0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(105vh) rotate(var(--spin)) scale(0.4); opacity: 0; } }
        .auth-container { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 24px; }
        .auth-card { background: var(--bg-card); padding: 32px; border-radius: 36px; box-shadow: var(--card-shadow); }
        .auth-toggle { display: flex; background: var(--bg-app); padding: 5px; border-radius: var(--radius-pill); margin-bottom: 20px; position: relative; height: 50px; }
        .auth-toggle-btn { flex: 1; background: transparent; color: var(--text-sec); font-weight: 700; font-size: 0.95rem; z-index: 2; cursor: pointer; border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: center; user-select: none; }
        .auth-toggle-btn.active { color: #fff; }
        .auth-slider { position: absolute; top: 5px; left: 5px; width: calc(50% - 5px); height: calc(100% - 10px); background: var(--icon-color); border-radius: var(--radius-pill); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        .auth-slider.right { transform: translateX(100%); }
        .app-layout { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { padding: 20px 20px 0; z-index: 10; flex-shrink: 0; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; gap: 12px; }
        .header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .user-greeting h1 { font-size: 1.55rem; font-weight: 900; line-height: 1.2; background: var(--love-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .user-greeting p { font-size: 0.92rem; color: var(--text-sec); font-weight: 700; margin-bottom: 1px; }
        .giraffe-svg { filter: drop-shadow(0 4px 10px rgba(255,183,77,0.2)); flex-shrink: 0; }
        .motiv-banner { background: var(--love-grad); padding: 12px 18px; border-radius: 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; min-height: 48px; position: relative; overflow: hidden; cursor: pointer; }
        .motiv-banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); background-size: 200% 100%; animation: shimmer 3s infinite; }
        .motiv-text { color: #fff; font-weight: 800; font-size: 0.88rem; position: relative; z-index: 2; flex: 1; line-height: 1.3; }
        .motiv-text.anim-in { animation: motivIn 0.4s ease-out forwards; }
        .motiv-text.anim-out { animation: motivOut 0.3s ease-in forwards; }
        .streak-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 14px; padding: 8px 16px; background: rgba(236,64,122,0.08); border-radius: 30px; }
        .streak-fire { font-size: 1.4rem; animation: streakPulse 1.5s ease-in-out infinite; }
        .streak-label { font-size: 0.82rem; font-weight: 800; color: var(--cat-novia); }
        .streak-num { font-size: 1rem; font-weight: 900; color: var(--cat-novia); }
        .func-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
        .func-card { background: var(--bg-card); padding: 16px 8px; border-radius: var(--radius-card); box-shadow: var(--card-shadow); text-align: center; cursor: pointer; transition: transform 0.2s; position: relative; overflow: hidden; }
        .func-card:active { transform: scale(0.94); }
        .func-icon { font-size: 1.6rem; color: var(--icon-color); margin-bottom: 4px; }
        .func-val { font-size: 1.2rem; font-weight: 900; color: var(--text-main); }
        .func-label { font-size: 0.72rem; font-weight: 700; color: var(--text-sec); }
        .func-badge { position: absolute; top: 6px; right: 6px; background: var(--prio-high); color: #fff; font-size: 0.6rem; font-weight: 900; padding: 2px 7px; border-radius: 20px; min-width: 18px; text-align: center; animation: pulseUrgent 1.5s ease-in-out infinite; }
        .sticky-wrap { position: relative; margin-bottom: 14px; }
        .sticky-note { background: linear-gradient(145deg, #FFFDE7, #FFF9C4); color: #5D4037; padding: 18px 18px 14px; border-radius: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.04), 0 12px 24px rgba(0,0,0,0.08); }
        .sticky-note textarea { width: 100%; background: transparent; border: none; outline: none; color: #5D4037; font-weight: 600; resize: none; font-size: 0.88rem; font-style: italic; line-height: 1.4; }
        .note-pin { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 14px; height: 14px; background: radial-gradient(circle at 35% 35%, #FF8A80, #C62828); border-radius: 50%; box-shadow: 0 3px 6px rgba(0,0,0,0.2); z-index: 5; }
        .search-bar { display: flex; align-items: center; gap: 12px; background: var(--bg-card); padding: 14px 20px; border-radius: var(--radius-pill); box-shadow: var(--card-shadow); margin-bottom: 12px; }
        .search-bar input { border: none; background: transparent; width: 100%; font-weight: 700; color: var(--text-main); outline: none; font-size: 0.95rem; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 14px; }
        .filter-chip { padding: 8px 13px; border-radius: var(--radius-pill); font-size: 0.78rem; font-weight: 800; border: none; cursor: pointer; transition: all 0.25s; background: var(--bg-card); color: var(--text-sec); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .filter-chip.active { color: #fff; transform: scale(1.04); box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
        .task-scroll { flex: 1; overflow-y: auto; padding: 4px 20px 130px; -webkit-overflow-scrolling: touch; }
        .task-card { background: var(--bg-card); padding: 16px; border-radius: var(--radius-card); margin-bottom: 12px; display: flex; align-items: center; gap: 14px; box-shadow: var(--card-shadow); border-left: 6px solid transparent; transition: opacity 0.3s, transform 0.3s; }
        .task-card.done { opacity: 0.5; }
        .task-card.done .task-title { text-decoration: line-through; }
        .task-card.p-high { border-left-color: var(--prio-high); }
        .task-card.p-med { border-left-color: var(--prio-med); }
        .task-card.p-low { border-left-color: var(--prio-low); }
        .check-box { width: 28px; height: 28px; min-width: 28px; border: 3px solid var(--text-sec); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); color: transparent; font-size: 0.9rem; }
        .check-box.checked { background: var(--icon-color); border-color: var(--icon-color); color: #fff; transform: rotate(8deg) scale(1.1); }
        .task-body { flex: 1; min-width: 0; }
        .task-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 5px; line-height: 1.3; word-break: break-word; }
        .task-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 0.7rem; font-weight: 800; color: var(--text-sec); }
        .meta-badge { padding: 2px 8px; border-radius: 6px; font-size: 0.68rem; font-weight: 800; }
        .meta-cat { color: #fff; }
        .task-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .mini-btn { width: 32px; height: 32px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; color: var(--text-sec); background: rgba(0,0,0,0.04); transition: 0.2s; }
        .mini-btn.ed:hover { background: #E3F2FD; color: var(--icon-color); }
        .mini-btn.dl:hover { background: #FFEBEE; color: #EF5350; }
        .fab { position: fixed; bottom: 32px; right: 32px; width: 68px; height: 68px; background: var(--primary-grad); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: var(--btn-shadow); z-index: 100; border: 4px solid var(--bg-card); cursor: pointer; transition: transform 0.2s; }
        .fab:active { transform: scale(0.88); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-sec); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(6px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.open { opacity: 1; pointer-events: auto; }
        .modal-box { background: var(--bg-card); width: 92%; max-width: 380px; max-height: 88vh; overflow-y: auto; border-radius: 32px; padding: 28px 24px; transform: scale(0.9) translateY(20px); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 24px 60px rgba(0,0,0,0.18); }
        .overlay.open .modal-box { transform: scale(1) translateY(0); }
        .modal-box h3 { font-size: 1.35rem; margin-bottom: 20px; font-weight: 900; }
        .prio-row { display: flex; gap: 8px; margin-bottom: 18px; }
        .prio-opt { flex: 1; padding: 11px 6px; border-radius: 14px; border: 2px solid rgba(0,0,0,0.06); background: var(--bg-app); font-weight: 800; font-size: 0.78rem; cursor: pointer; text-align: center; transition: 0.2s; color: var(--text-sec); }
        .prio-opt.sel { color: #fff; border-color: transparent; }
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
        .cat-opt { padding: 11px 4px; border-radius: 14px; border: 2px solid transparent; background: var(--bg-app); text-align: center; font-weight: 800; font-size: 0.78rem; color: var(--text-sec); cursor: pointer; transition: 0.2s; }
        .cat-opt.sel { color: #fff; border-color: transparent; }
        .date-picker-wrap { margin-bottom: 20px; }
        .date-picker-label { font-size: 0.78rem; font-weight: 800; color: var(--text-sec); display: block; margin-bottom: 8px; text-align: left; }
        .date-picker-btn { width: 100%; padding: 14px 18px; border-radius: var(--radius-btn); border: 2px dashed var(--icon-light); background: rgba(2,136,209,0.06); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; position: relative; }
        .date-picker-btn:hover { background: rgba(2,136,209,0.12); }
        .date-picker-btn.date-error { border-color: var(--prio-high); border-style: solid; background: rgba(255,82,80,0.06); }
        .cal-icon { font-size: 1.4rem; color: var(--icon-color); flex-shrink: 0; }
        .cal-text { font-weight: 700; color: var(--text-main); font-size: 0.95rem; }
        .cal-text.placeholder { color: var(--text-sec); opacity: 0.6; }
        .cal-error-text { font-size: 0.72rem; font-weight: 800; color: var(--prio-high); margin-top: 6px; display: flex; align-items: center; gap: 4px; }
        .cal-clear { position: absolute; right: 14px; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.06); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; color: var(--text-sec); transition: 0.2s; z-index: 20; }
        .cal-clear:hover { background: #FFEBEE; color: #EF5350; }
        .date-hidden-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; font-size: 18px; }
        .settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 3000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .settings-overlay.open { opacity: 1; pointer-events: auto; }
        .settings-drawer { position: absolute; top: 0; right: 0; bottom: 0; width: 82%; max-width: 310px; background: var(--bg-card); box-shadow: -8px 0 40px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.22, 0.8, 0.36, 1); padding: 28px 22px; display: flex; flex-direction: column; border-radius: 28px 0 0 28px; }
        .settings-overlay.open .settings-drawer { transform: translateX(0); }
        .timer-display { text-align: center; margin-bottom: 24px; }
        .timer-circle { width: 160px; height: 160px; border-radius: 50%; margin: 0 auto 16px; position: relative; display: flex; align-items: center; justify-content: center; }
        .timer-circle svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
        .timer-circle circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .timer-bg { stroke: var(--bg-app); }
        .timer-progress { stroke: var(--icon-color); transition: stroke-dashoffset 1s linear; }
        .timer-inner { text-align: center; z-index: 2; }
        .timer-time { font-size: 2.2rem; font-weight: 900; color: var(--text-main); line-height: 1; }
        .timer-label-text { font-size: 0.75rem; font-weight: 800; color: var(--text-sec); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .timer-presets { display: flex; gap: 8px; margin-bottom: 20px; }
        .timer-preset-btn { flex: 1; padding: 10px 6px; border-radius: 14px; border: 2px solid rgba(0,0,0,0.06); background: var(--bg-app); font-weight: 800; font-size: 0.78rem; cursor: pointer; text-align: center; transition: 0.2s; color: var(--text-sec); }
        .timer-preset-btn.sel { background: var(--icon-color); color: #fff; border-color: var(--icon-color); }
        .timer-controls { display: flex; gap: 10px; }
        .timer-btn { flex: 1; padding: 14px; border-radius: var(--radius-btn); border: none; font-weight: 800; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
        .week-day { text-align: center; }
        .week-day-label { font-size: 0.65rem; font-weight: 800; color: var(--text-sec); margin-bottom: 6px; text-transform: uppercase; }
        .week-day-bar { width: 100%; height: 80px; border-radius: 10px; background: var(--bg-app); position: relative; overflow: hidden; display: flex; align-items: flex-end; }
        .week-day-fill { width: 100%; border-radius: 10px; background: var(--primary-grad); transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1); }
        .week-day-num { font-size: 0.75rem; font-weight: 900; color: var(--text-main); margin-top: 4px; }
        .week-day-today .week-day-bar { box-shadow: 0 0 0 2px var(--icon-color); }
        .week-stats { display: flex; justify-content: space-around; margin-bottom: 16px; }
        .week-stat { text-align: center; }
        .week-stat-val { font-size: 1.3rem; font-weight: 900; color: var(--text-main); }
        .week-stat-label { font-size: 0.7rem; font-weight: 700; color: var(--text-sec); }
        .week-best-day { background: rgba(2,136,209,0.06); padding: 12px 16px; border-radius: 16px; display: flex; align-items: center; gap: 12px; }
        .week-best-icon { font-size: 1.4rem; color: var(--icon-color); }
        .week-best-text { font-size: 0.85rem; font-weight: 800; color: var(--text-main); line-height: 1.3; }

                    var catLabel = (CATEGORIES.find(function(c) { return c.id === st.category; }) || {}).label || 'General';
                    return React.createElement('div', {
                        key: st.id,
                        className: 'task-card p-' + st.priority + (st.completed ? ' done' : '') + (removingId === st.id ? ' task-removing' : '') + ' task-enter',
                        style: {animationDelay: (idx * 0.04) + 's'}
                    },
                        React.createElement('div', {
                            className: 'check-box' + (st.completed ? ' checked' : ''),
                            onClick: function() { toggleDone(st.id); }
                        }, React.createElement('i', {className: 'ph ph-check-fat-fill'})),
                        React.createElement('div', {className: 'task-body'},
                            React.createElement('div', {className: 'task-title'}, st.text),
                            React.createElement('div', {className: 'task-meta'},
                                React.createElement('span', {
                                    className: 'meta-badge',
                                    style: {background: 'transparent', color: prioInfo.color, border: '1px solid ' + prioInfo.color}
                                }, prioInfo.label),
                                React.createElement('span', {
                                    className: 'meta-badge meta-cat',
                                    style: {background: catColor}
                                }, catLabel),
                                st.date
                                    ? React.createElement('span', {style: {fontSize: '0.68rem', fontWeight: 800}},
                                        React.createElement('i', {className: 'ph ph-calendar-blank', style: {marginRight: 3}}),
                                        formatFecha(st.date)
                                    )
                                    : null,
                                st.completedDate
                                    ? React.createElement('span', {style: {fontSize: '0.65rem', fontWeight: 800, color: 'var(--cat-salud)'}},
                                        'Hecha ' + formatFecha(st.completedDate)
                                    )
                                    : null
                            )
                        ),
                        React.createElement('div', {className: 'task-actions'},
                            React.createElement('button', {
                                className: 'mini-btn ed',
                                onClick: function() { setEditTask(task); setModalOpen(true); }
                            }, React.createElement('i', {className: 'ph ph-pencil-simple'})),
                            React.createElement('button', {
                                className: 'mini-btn dl',
                                onClick: function() { setDelId(st.id); }
                            }, React.createElement('i', {className: 'ph ph-trash'}))
                        )
                    );
                });
            }

            return React.createElement('div', {className: 'app-layout elastic-in'},
                React.createElement('div', {className: 'toast-wrap'},
                    React.createElement('div', {className: 'toast-msg' + (toast ? ' visible' : '')},
                        React.createElement('i', {className: 'ph ph-check-circle'}), ' ', toast
                    )
                ),
                React.createElement('div', {className: 'top-bar'},
                    React.createElement('div', {className: 'header-row'},
                        React.createElement('div', {className: 'header-left'},
                            React.createElement(GiraffeHead, {size: 48}),
                            React.createElement('div', {className: 'user-greeting'},
                                React.createElement('p', null, getGreeting() + ', ' + (user ? user.name : 'Osito')),
                                React.createElement('h1', null, 'Hoy te amo más que ayer')
                            )
                        ),
                        React.createElement('button', {
                            className: 'btn-icon pulse-glow',
                            onClick: function() { setSettingsOpen(true); }
                        }, React.createElement('i', {className: 'ph ph-gear-six'}))
                    ),
                    React.createElement('div', {
                        className: 'motiv-banner',
                        onClick: function() {
                            setMotivAnim('anim-out');
                            setTimeout(function() {
                                setMotivText(LOVE_MSGS[Math.floor(Math.random() * LOVE_MSGS.length)]);
                                setMotivAnim('anim-in');
                            }, 300);
                        }
                    },
                        React.createElement('i', {className: 'ph ph-heart-fill', style: {color: '#fff', fontSize: '1.2rem', flexShrink: 0, position: 'relative', zIndex: 2}}),
                        React.createElement('span', {className: 'motiv-text ' + motivAnim}, motivText)
                    ),
                    streak > 0
                        ? React.createElement('div', {className: 'streak-row'},
                            React.createElement('span', {className: 'streak-fire'},
                                React.createElement('i', {className: 'ph ph-fire', style: {color: '#FF6D00'}})
                            ),
                            React.createElement('span', {className: 'streak-label'}, 'Racha de'),
                            React.createElement('span', {className: 'streak-num'}, String(streak)),
                            React.createElement('span', {className: 'streak-label'}, 'días completando')
                        )
                        : null,
                    React.createElement('div', {className: 'func-grid'},
                        React.createElement('div', {className: 'func-card', onClick: giveHug},
                            React.createElement('i', {className: 'ph ph-heart func-icon', style: {color: 'var(--cat-novia)'}}),
                            React.createElement('div', {className: 'func-val'}, String(hugs)),
                            React.createElement('div', {className: 'func-label'}, 'Abrazos')
                        ),
                        React.createElement('div', {className: 'func-card', onClick: function() { setDueOpen(true); }},
                            React.createElement('i', {className: 'ph ph-alarm func-icon', style: {color: 'var(--prio-high)'}}),
                            React.createElement('div', {className: 'func-val', style: {color: 'var(--prio-high)'}}, String(dueCount)),
                            React.createElement('div', {className: 'func-label', style: {color: 'var(--prio-high)', fontSize: '0.68rem'}}, 'Por vencer'),
                            dueCount > 0
                                ? React.createElement('div', {className: 'func-badge'}, String(dueCount))
                                : null
                        ),
                        React.createElement('div', {className: 'func-card', onClick: function() { setTimerOpen(true); }},
                            React.createElement('i', {className: 'ph ph-timer func-icon', style: {color: 'var(--cat-trabajo)'}}),
                            React.createElement('div', {className: 'func-val'}, String(todayCount)),
                            React.createElement('div', {className: 'func-label', style: {fontSize: '0.68rem'}}, 'Hechas hoy')
                        ),
                        React.createElement('div', {className: 'func-card', onClick: function() { setWeekOpen(true); }},
                            React.createElement('i', {className: 'ph ph-chart-bar func-icon', style: {color: 'var(--cat-uni)'}}),
                            React.createElement('div', {className: 'func-val'}, String(completedCount) + '/' + String(tasks.length)),
                            React.createElement('div', {className: 'func-label', style: {fontSize: '0.68rem'}}, 'Pend: ' + String(pendingCount))
                        )
                    ),
                    React.createElement('div', {className: 'sticky-wrap'},
                        React.createElement('div', {className: 'note-pin'}),
                        React.createElement('div', {className: 'sticky-note'},
                            React.createElement('textarea', {
                                rows: '2', placeholder: 'Escribe una nota, mi muñeco...',
                                value: note, onChange: function(e) { saveNote(e.target.value); }
                            })
                        )
                    ),
                    React.createElement('div', {className: 'search-bar'},
                        React.createElement('i', {className: 'ph ph-magnifying-glass', style: {fontSize: '1.2rem', color: 'var(--text-sec)'}}),
                        React.createElement('input', {
                            type: 'text', placeholder: 'Buscar tareas...',
                            value: search, onChange: function(e) { setSearch(e.target.value); }
                        }),
                        search
                            ? React.createElement('button', {
                                onClick: function() { setSearch(''); },
                                style: {background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-sec)', fontSize: '1.1rem'}
                            }, React.createElement('i', {className: 'ph ph-x-circle'}))
                            : null
                    ),
                    React.createElement('div', {className: 'filter-row'},
                        CATEGORIES.map(function(c) {
                            var isActive = filterCat === c.id;
                            return React.createElement('button', {
                                key: c.id,
                                className: 'filter-chip' + (isActive ? ' active' : ''),
                                onClick: function() { setFilterCat(c.id); },
                                style: {
                                    backgroundColor: isActive ? (c.id === 'all' ? 'var(--icon-color)' : c.color) : 'var(--bg-card)',
                                    color: isActive ? '#fff' : 'var(--text-sec)'
                                }
                            }, c.label);
                        })
                    )
                ),
                React.createElement('div', {className: 'task-scroll'}, taskElements),
                React.createElement('button', {
                    className: 'fab',
                    onClick: function() { setEditTask(null); setModalOpen(true); }
                }, React.createElement('i', {className: 'ph ph-plus'})),
                React.createElement(TaskModal, {
                    open: modalOpen,
                    onClose: function() { setModalOpen(false); setEditTask(null); },
                    onSave: handleSave,
                    editTask: editTask
                }),
                React.createElement(DeleteModal, {
                    open: !!delId,
                    onClose: function() { setDelId(null); },
                    onConfirm: handleDelete
                }),
                React.createElement(DueSoonModal, {
                    open: dueOpen,
                    onClose: function() { setDueOpen(false); },
                    tasks: tasks
                }),
                React.createElement(FocusTimer, {
                    open: timerOpen,
                    onClose: function() { setTimerOpen(false); }
                }),
                React.createElement(WeeklyProgress, {
                    open: weekOpen,
                    onClose: function() { setWeekOpen(false); },
                    tasks: tasks
                }),
                React.createElement(Settings, {
                    open: settingsOpen,
                    onClose: function() { setSettingsOpen(false); },
                    user: user,
                    onSave: onUpdateUser,
                    onLogout: onLogout,
                    theme: theme,
                    onToggleTheme: function() { setTheme(function(t) { return t === 'light' ? 'dark' : 'light'; }); }
                })
            );
        };

        /* FIX #9: App con cierre correcto de ReactDOM.createRoot().render() */
        const App = function() {
            var userArr = useState(function() {
                try { var u = localStorage.getItem('op_user_v5'); return u ? JSON.parse(u) : null; }
                catch (e) { return null; }
            });
            var user = userArr[0];
            var setUser = userArr[1];
            var handleLogin = function(u) { setUser(u); try { localStorage.setItem('op_user_v5', JSON.stringify(u)); } catch (e) {} };
            var handleLogout = function() { setUser(null); try { localStorage.removeItem('op_user_v5'); } catch (e) {} };
            var handleUpdateUser = function(u) { setUser(u); try { localStorage.setItem('op_user_v5', JSON.stringify(u)); } catch (e) {} };
            return user
                ? React.createElement(Dashboard, {user: user, onLogout: handleLogout, onUpdateUser: handleUpdateUser})
                : React.createElement(AuthScreen, {onLogin: handleLogin});
        };

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
